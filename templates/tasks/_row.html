<tr id="task-row-{{ task.id }}">
  <td><a href="/tasks/{{ task.id }}">{{ task.title }}</a></td>
  <td>{{ task.description[:80] }}{% if task.description|length > 80 %}…{% endif %}</td>
  <td>{{ task.function_roles|length }}</td>
  <td>
    <button class="outline secondary" style="padding:0.2rem 0.6rem;font-size:0.8rem"
      hx-delete="/tasks/{{ task.id }}"
      hx-target="#task-row-{{ task.id }}"
      hx-swap="outerHTML"
      hx-confirm="{{ t.task_delete_confirm | replace('%s', task.title) }}">
      {{ t.btn_delete }}
    </button>
  </td>
</tr>
