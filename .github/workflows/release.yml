name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: build.bat
        shell: cmd

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset --yes --no-progress
          $ec = $LASTEXITCODE
          # 103 / 3010 = "reboot required" — WiX is installed, runner won't reboot
          if ($ec -ne 0 -and $ec -ne 103 -and $ec -ne 3010) { exit $ec }
          $wixBin = Get-ChildItem 'C:\Program Files (x86)\WiX Toolset*\bin' |
                    Sort-Object Name -Descending |
                    Select-Object -First 1 -ExpandProperty FullName
          Add-Content $env:GITHUB_PATH $wixBin

      - name: Harvest app files
        run: heat dir dist\RACI-VS -cg ApplicationFiles -dr INSTALLDIR -scom -srd -sfrag -sreg -gg -out dist_files.wxs
        shell: cmd

      - name: Compile WiX sources
        run: |
          mkdir build
          candle raci_vs.wxs dist_files.wxs -out build\
        shell: cmd

      - name: Link MSI
        run: |
          mkdir Output
          light build\raci_vs.wixobj build\dist_files.wixobj -ext WixUIExtension -cultures:en-US -o Output\RACI-VS_Setup.msi
        shell: cmd

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: RACI-VS_Setup
          path: Output\RACI-VS_Setup.msi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Output\RACI-VS_Setup.msi
          generate_release_notes: true
